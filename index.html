<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TÁ NA MÃO | Cardápio Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #ff4757; 
            --bg: #0a0a0a; 
            --card: #161616; 
            --surface: #222222;
            --green: #2ecc71; 
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg);
            color: var(--text-main); 
            padding-bottom: 120px; 
            overflow-x: hidden;
        }

        header { 
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px);
            padding: 18px 20px; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100;
        }
        header h1 { font-weight: 800; font-size: 1.3rem; letter-spacing: -1px; }
        header h1 span { color: var(--primary); }

        .status-badge { font-size: 10px; padding: 5px 12px; border-radius: 100px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .open { background: rgba(46, 204, 113, 0.1); color: var(--green); border: 1px solid rgba(46, 204, 113, 0.2); }
        .closed { background: rgba(255, 71, 87, 0.1); color: var(--primary); border: 1px solid rgba(255, 71, 87, 0.2); }

        .container { padding: 15px; max-width: 600px; margin: auto; }

        .cat-header { margin: 25px 0 15px; display: flex; align-items: center; gap: 12px; }
        .cat-header h3 { font-size: 1rem; font-weight: 800; text-transform: uppercase; color: var(--primary); }
        .cat-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }

        .item { 
            background: var(--card); 
            border-radius: 20px; 
            padding: 12px; 
            margin-bottom: 14px; 
            display: flex; gap: 12px; 
            border: 1px solid rgba(255,255,255,0.02);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        
        .item-img { width: 85px; height: 85px; min-width: 85px; border-radius: 16px; object-fit: cover; background: #1a1a1a; }
        .item-info { flex: 1; display: flex; flex-direction: column; min-width: 0; justify-content: space-between; }
        .item-name { font-size: 0.95rem; font-weight: 700; color: #fff; margin-bottom: 2px; }
        .item-desc { color: var(--text-sub); font-size: 0.75rem; line-height: 1.2; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .item-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; gap: 5px; }
        .item-price { color: var(--green); font-weight: 700; font-size: 0.9rem; white-space: nowrap; }

        .qty-box { display: flex; align-items: center; gap: 8px; background: var(--surface); padding: 3px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.05); }
        .qty-box button { background: var(--primary); color: white; border: none; width: 24px; height: 24px; border-radius: 50%; font-size: 1rem; cursor: pointer; font-weight: bold; }
        .val-qty { font-weight: 800; min-width: 15px; text-align: center; font-size: 0.85rem; }

        .cart-footer { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: var(--primary); padding: 16px 20px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(255, 71, 87, 0.3); z-index: 999; cursor: pointer; transition: 0.3s; }
        .cart-footer:active { transform: translateX(-50%) scale(0.95); }

        #modal-checkout { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); z-index: 1000; display: none; padding: 15px; overflow-y: auto; }
        .checkout-card { background: var(--card); padding: 25px; border-radius: 25px; width: 100%; max-width: 450px; margin: 20px auto; border: 1px solid rgba(255,255,255,0.05); }
        .form-input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #222; background: #0c0c0c; color: white; font-size: 14px; outline: none; }
        .form-input:focus { border-color: var(--primary); }

        .resumo-container { background: #0c0c0c; padding: 15px; border-radius: 15px; margin: 15px 0; border: 1px dashed #333; }
        .resumo-linha { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; color: var(--text-sub); }
        .resumo-total { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid #222; font-size: 1.2rem; font-weight: 800; color: var(--green); }

        .hidden { display: none !important; }
        .btn-lock { background: none; border: none; color: #333; cursor: pointer; padding: 10px; }
        
        /* Estilo para item pausado no ADM */
        .item-pausado { opacity: 0.4; border: 1px dashed #ff4757 !important; filter: grayscale(0.8); }
    </style>
</head>
<body>

<header>
    <h1>TÁ NA <span>MÃO</span></h1>
    <div id="status-loja"></div>
    <button class="btn-lock" onclick="logarAdm()"><i class="fa-solid fa-lock"></i></button>
</header>

<div class="container">
    <div id="painel-adm" class="admin-box hidden" style="background: #0066ff22; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #0066ff44;">
        <h3 style="margin-bottom: 10px; font-size: 14px;">⚙️ Configurações ADM</h3>
        <div id="horarios-config" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; font-size: 11px; margin-bottom: 10px;"></div>
        <button onclick="salvarHorarios()" style="width:100%; padding:10px; border-radius:10px; border:none; background:#0066ff; color:white; font-weight:bold;">SALVAR HORÁRIOS</button>
    </div>
    <div id="cardapio"></div>
</div>

<div class="cart-footer hidden" id="cart-footer" onclick="abrirCheckout()">
    <div style="display:flex; align-items:center; gap:10px;">
        <div style="background:rgba(255,255,255,0.2); padding:5px 12px; border-radius:10px; font-weight:800;" id="cart-qnt">0</div>
        <span style="font-weight:800; letter-spacing: 0.5px;">VER CARRINHO</span>
    </div>
    <span id="footer-total" style="font-weight:800;">R$ 0,00</span>
</div>

<div id="modal-checkout">
    <div class="checkout-card">
        <h2 style="margin-bottom: 15px; font-weight: 800;">Finalizar Pedido</h2>
        <input type="text" id="cli-nome" class="form-input" placeholder="Qual seu nome?">
        <select id="cli-metodo" class="form-input" onchange="updateCart()">
            <option value="" disabled selected hidden>Forma de entrega</option>
            <option value="retirada">RETIRADA</option>
            <option value="delivery">DELIVERY</option>
        </select>
        <div id="sessao-endereco" class="hidden">
            <input type="text" id="cli-end" class="form-input" placeholder="Rua, Número e Bairro">
            <input type="text" id="cli-comple" class="form-input" placeholder="Ponto de Referência">
        </div>
        <select id="cli-pagamento" class="form-input" onchange="toggleTroco()">
            <option value="" disabled selected hidden>Forma de Pagamento</option>
            <option value="Pix">Pix</option>
            <option value="Cartão">Cartão</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>
        <div id="sessao-troco" class="hidden">
            <input type="number" id="cli-troco" class="form-input" placeholder="Troco para quanto?">
        </div>
        <textarea id="cli-obs" class="form-input" placeholder="Ex: Tirar cebola, ponto da carne, etc..." style="height: 80px; resize: none;"></textarea>
        <div class="resumo-container">
            <div class="resumo-linha"><span>Subtotal:</span><span id="resumo-subtotal">R$ 0,00</span></div>
            <div class="resumo-linha" id="linha-taxa"><span>Taxa de Entrega:</span><span id="resumo-taxa">R$ 3,00</span></div>
            <div class="resumo-total"><span>TOTAL:</span><span id="resumo-total">R$ 0,00</span></div>
        </div>
        <div style="display:flex; gap:10px; margin-top: 20px;">
            <button onclick="fecharCheckout()" style="flex:1; padding:15px; border-radius:15px; border:none; background:#222; color:white; font-weight:bold;">VOLTAR</button>
            <button onclick="finalizarPedido()" style="flex:2; padding:15px; border-radius:15px; border:none; background:var(--green); color:white; font-weight:bold;">ENVIAR PARA WHATSAPP</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    // ======= CONFIGURAÇÃO FIREBASE =======
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "ta-na-mao-delivery-app.firebaseapp.com",
        projectId: "ta-na-mao-delivery-app",
        storageBucket: "ta-na-mao-delivery-app.appspot.com",
        messagingSenderId: "SENDER_ID",
        appId: "APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const WHATSAPP = "5598984502253";
    let isAdm = false;
    let menu = { "Hambúrgueres": [], "Artesanais": [], "Bebidas": [], "Combos": [] };
    let agenda = { 0:{abre:"18:00",fecha:"23:00"}, 1:{abre:"18:00",fecha:"23:00"}, 2:{abre:"18:00",fecha:"23:00"}, 3:{abre:"18:00",fecha:"23:00"}, 4:{abre:"18:00",fecha:"23:00"}, 5:{abre:"18:00",fecha:"23:00"}, 6:{abre:"18:00",fecha:"23:00"} };

    db.collection("sistema").doc("cardapio").onSnapshot((doc) => { if (doc.exists) { menu = doc.data(); } render(); });
    db.collection("sistema").doc("horarios").onSnapshot((doc) => { if (doc.exists) { agenda = doc.data(); } render(); });

    function render() {
        const cardapioDiv = document.getElementById('cardapio');
        const statusDiv = document.getElementById('status-loja');
        const agora = new Date();
        const hoje = agenda[agora.getDay()];
        const horaAtual = agora.getHours().toString().padStart(2, '0') + ":" + agora.getMinutes().toString().padStart(2, '0');
        const aberto = (horaAtual >= hoje.abre && horaAtual <= hoje.fecha);
        statusDiv.innerHTML = aberto ? '<span class="status-badge open">● Aberto agora</span>' : '<span class="status-badge closed">● Fechado</span>';

        cardapioDiv.innerHTML = "";
        ["Hambúrgueres", "Artesanais", "Bebidas", "Combos"].forEach(cat => {
            let html = `
            <div class="cat-header">
                <h3>${cat}</h3>
                <div class="cat-line"></div>
                ${isAdm ? `<button onclick="addItem('${cat}')" style="background:#0066ff; color:white; border:none; padding:4px 8px; border-radius:5px; font-size:10px;">+ NOVO ITEM</button>` : ''}
            </div>`;
            
            if (menu[cat] && menu[cat].length > 0) {
                menu[cat].forEach((p, i) => {
                    // SE NÃO FOR ADM E O ITEM ESTIVER PAUSADO, PULA A RENDERIZAÇÃO
                    if (!isAdm && p.ativo === false) return;

                    html += `
                    <div class="item ${isAdm && p.ativo === false ? 'item-pausado' : ''}">
                        <div style="position:relative">
                            <img src="${p.foto || 'https://via.placeholder.com/100'}" class="item-img">
                            ${isAdm ? `<button onclick="mudarFoto('${cat}',${i})" style="position:absolute; bottom:0; right:0; background:white; border-radius:50%; border:none; width:28px; height:28px; color:black; font-size:12px; cursor:pointer;"><i class="fa-solid fa-camera"></i></button>` : ''}
                        </div>
                        <div class="item-info">
                            ${isAdm ? `
                                <input value="${p.nome}" onchange="edit('${cat}',${i},'nome',this.value)" style="background:#000; color:white; border:1px solid #333; margin-bottom:2px; font-size:12px; padding:2px; width:100%;">
                                <div style="display:flex; gap:5px; margin-bottom:5px;">
                                    <button onclick="toggleAtivo('${cat}',${i})" style="background:${p.ativo !== false ? '#2ecc71' : '#ff4757'}; color:white; border:none; padding:4px; border-radius:6px; font-size:9px; font-weight:800; flex:1;">
                                        ${p.ativo !== false ? '✅ ATIVO' : '🚫 PAUSADO'}
                                    </button>
                                    <button onclick="remover('${cat}',${i})" style="color:#aaa; background:none; border:1px solid #333; font-size:9px; padding:4px; border-radius:6px;">APAGAR</button>
                                </div>
                                <input value="${p.preco}" type="number" onchange="edit('${cat}',${i},'preco',this.value)" style="background:#000; color:var(--green); border:1px solid #333; width:60px; font-size:12px;">
                            ` : `
                                <span class="item-name">${p.nome}</span>
                                <span class="item-desc">${p.desc || 'Descrição não informada.'}</span>
                                <div class="item-bottom">
                                    <div class="item-price">R$ ${parseFloat(p.preco || 0).toFixed(2).replace('.',',')}</div>
                                    <div class="qty-box">
                                        <button onclick="qty(this, -1)">-</button>
                                        <span class="val-qty" data-name="${p.nome}" data-price="${p.preco}">0</span>
                                        <button onclick="qty(this, 1)">+</button>
                                    </div>
                                </div>
                            `}
                        </div>
                    </div>`;
                });
            } else { html += `<div style="color:#333; font-size:11px; padding:5px;">Sem itens nesta categoria...</div>`; }
            cardapioDiv.innerHTML += html;
        });
    }

    function qty(btn, d) {
        let span = btn.parentElement.querySelector('.val-qty');
        span.innerText = Math.max(0, parseInt(span.innerText) + d);
        updateCart();
    }

    function updateCart() {
        let subtotal = 0;
        let qtdTotal = 0;
        const taxaEntrega = 3.00;
        document.querySelectorAll('.val-qty').forEach(s => {
            subtotal += parseInt(s.innerText) * parseFloat(s.dataset.price);
            qtdTotal += parseInt(s.innerText);
        });
        const metodo = document.getElementById('cli-metodo').value;
        let total = subtotal;
        if(metodo === 'delivery' && qtdTotal > 0) {
            total += taxaEntrega;
            document.getElementById('linha-taxa').classList.remove('hidden');
            document.getElementById('resumo-taxa').innerText = "R$ 3,00";
            document.getElementById('sessao-endereco').classList.remove('hidden');
        } else {
            document.getElementById('linha-taxa').classList.add('hidden');
            document.getElementById('resumo-taxa').innerText = "R$ 0,00";
            document.getElementById('sessao-endereco').classList.add('hidden');
        }
        document.getElementById('footer-total').innerText = "R$ " + total.toFixed(2).replace('.',',');
        document.getElementById('resumo-subtotal').innerText = "R$ " + subtotal.toFixed(2).replace('.',',');
        document.getElementById('resumo-total').innerText = "R$ " + total.toFixed(2).replace('.',',');
        document.getElementById('cart-qnt').innerText = qtdTotal;
        document.getElementById('cart-footer').classList.toggle('hidden', qtdTotal === 0);
    }

    function finalizarPedido() {
        const nome = document.getElementById('cli-nome').value;
        const metodo = document.getElementById('cli-metodo').value;
        const subtotal = document.getElementById('resumo-subtotal').innerText;
        const taxa = document.getElementById('resumo-taxa').innerText;
        const total = document.getElementById('resumo-total').innerText;
        const obs = document.getElementById('cli-obs').value;
        const pagamento = document.getElementById('cli-pagamento').value;
        if(!nome) return alert("Por favor, digite seu nome!");
        if(!metodo) return alert("Escolha o método de entrega!");
        let msg = `*🍔 NOVO PEDIDO - TÁ NA MÃO*\n`;
        msg += `------------------------------------------\n`;
        msg += `👤 *Cliente:* ${nome}\n`;
        msg += `📍 *Método:* ${metodo.toUpperCase()}\n`;
        if(metodo === 'delivery') {
            msg += `🏠 *Endereço:* ${document.getElementById('cli-end').value}\n`;
            msg += `🏢 *Ref:* ${document.getElementById('cli-comple').value}\n`;
        }
        msg += `------------------------------------------\n*ITENS DO PEDIDO:*\n`;
        let temItens = false;
        document.querySelectorAll('.val-qty').forEach(s => {
            let q = parseInt(s.innerText);
            if(q > 0) {
                temItens = true;
                let precoTotalItem = (q * parseFloat(s.dataset.price)).toFixed(2).replace('.', ',');
                msg += `✅ ${q}x ${s.dataset.name} (R$ ${precoTotalItem})\n`;
            }
        });
        if(!temItens) return alert("Seu carrinho está vazio!");
        if(obs) msg += `\n📝 *Obs:* ${obs}\n`;
        msg += `------------------------------------------\n💰 *RESUMO FINANCEIRO*\nSubtotal: ${subtotal}\n`;
        if(metodo === 'delivery') msg += `Taxa de Entrega: ${taxa}\n`;
        msg += `💳 *Pagamento:* ${pagamento}\n`;
        if(pagamento === 'Dinheiro') {
            let troco = document.getElementById('cli-troco').value;
            msg += `💵 *Troco para:* R$ ${troco ? troco : 'Não necessário'}\n`;
        }
        msg += `\n*TOTAL GERAL: ${total}*\n------------------------------------------`;
        window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`);
    }

    // ======= FUNÇÕES ADMINISTRATIVAS (O BOTÃO SUSPENDER ESTÁ AQUI) =======
    function logarAdm() {
        if(prompt("Senha de acesso:") === "jorge2026") {
            isAdm = !isAdm;
            document.getElementById('painel-adm').classList.toggle('hidden');
            if(isAdm) {
                const grid = document.getElementById('horarios-config');
                grid.innerHTML = "";
                ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"].forEach((dia, i) => {
                    grid.innerHTML += `<span>${dia}</span>
                    <input type="time" id="abre-${i}" value="${agenda[i].abre}" style="background:#000; color:white; border:none;">
                    <input type="time" id="fecha-${i}" value="${agenda[i].fecha}" style="background:#000; color:white; border:none;">`;
                });
            }
            render();
        }
    }

    // NOVA FUNÇÃO: INVERTE O STATUS DO PRODUTO (ATIVO/PAUSADO)
    function toggleAtivo(cat, i) {
        if (menu[cat][i].ativo === undefined) menu[cat][i].ativo = true;
        menu[cat][i].ativo = !menu[cat][i].ativo;
        save();
    }

    function addItem(cat) { menu[cat].push({nome:"Novo Item", desc: "", preco: 0, foto: "", ativo: true}); save(); }
    function edit(cat, i, campo, val) { menu[cat][i][campo] = campo === 'preco' ? parseFloat(val) : val; save(); }
    function remover(cat, i) { if(confirm("Deseja apagar este item?")) { menu[cat].splice(i,1); save(); } }
    function save() { db.collection("sistema").doc("cardapio").set(menu); }
    
    function salvarHorarios() {
        let novos = {};
        for(let i=0; i<=6; i++) { novos[i] = { abre: document.getElementById(`abre-${i}`).value, fecha: document.getElementById(`fecha-${i}`).value }; }
        db.collection("sistema").doc("horarios").set(novos).then(() => alert("✅ Horários salvos!"));
    }

    function mudarFoto(cat, i) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    menu[cat][i].foto = canvas.toDataURL('image/jpeg', 0.7);
                    save();
                }
            };
        };
        input.click();
    }

    function toggleTroco() { document.getElementById('sessao-troco').classList.toggle('hidden', document.getElementById('cli-pagamento').value !== 'Dinheiro'); }
    function abrirCheckout() { document.getElementById('modal-checkout').style.display = 'block'; }
    function fecharCheckout() { document.getElementById('modal-checkout').style.display = 'none'; }
</script>
</body>
</html>
